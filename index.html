<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #0b0d14; /* fallback while images load */
    }

    /* ── Background layers (crossfade) ─────────── */
    .bg-layer {
      position: fixed; inset: 0;
      background: center / cover no-repeat;
      opacity: 0;
      z-index: 0;
    }

    /* ── Dark overlay ───────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ── Vignette ───────────────────────────────── */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(
        ellipse 100% 100% at 50% 50%,
        transparent 25%,
        rgba(0, 0, 0, 0.6) 100%
      );
      z-index: 2;
      pointer-events: none;
    }

    /* ── Content ────────────────────────────────── */
    #app {
      position: fixed; inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 9vw;
      z-index: 3;
      animation: appear 2s ease both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(1vw); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Clock ──────────────────────────────────── */
    .clock-row {
      display: flex;
      align-items: baseline;
      user-select: none;
    }

    .clock-digits {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 18vw;
      color: rgba(228, 220, 208, 0.93);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .clock-sep {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 18vw;
      color: rgba(228, 220, 208, 0.93);
      letter-spacing: -0.02em;
      line-height: 1;
      margin: 0 0.25vw;
      animation: blink 2s step-end infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 0.93; }
      50%, 100% { opacity: 0.08; }
    }

    /* ── Date ───────────────────────────────────── */
    #el-date {
      margin-top: 1.2vw;
      font-family: 'Raleway', sans-serif;
      font-weight: 200;
      font-size: 0.95vw;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: rgba(168, 158, 142, 0.72);
      user-select: none;
    }

    /* ── Divider ────────────────────────────────── */
    .divider {
      width: 6vw; height: 1px;
      background: linear-gradient(to right, transparent, rgba(130, 118, 100, 0.3), transparent);
      margin: 3vw 0;
    }

    /* ── Quote ──────────────────────────────────── */
    #quote-wrap {
      text-align: center;
      max-width: 44vw;
      transition: opacity 0.7s ease;
    }

    #el-quote {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: 2vw;
      line-height: 1.55;
      color: rgba(185, 174, 158, 0.68);
      letter-spacing: 0.01em;
    }

    /* ── Skip button ────────────────────────────── */
    #skip-bg {
      position: fixed;
      top: 0; right: 0;
      width: 14vw;
      height: 14vw;
      z-index: 20;
      cursor: pointer;
    }

    #el-author {
      margin-top: 1.1vw;
      font-family: 'Raleway', sans-serif;
      font-weight: 200;
      font-size: 0.72vw;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(108, 98, 85, 0.62);
      min-height: 1em; /* prevent layout shift when empty */
    }
  </style>
</head>
<body>

<!-- Background layers -->
<div id="bg-0" class="bg-layer"></div>
<div id="bg-1" class="bg-layer"></div>

<!-- Overlays -->
<div id="overlay"></div>
<div id="vignette"></div>

<!-- Skip button: tap top-right corner to advance background -->
<div id="skip-bg"></div>

<!-- Content -->
<div id="app">
  <div class="clock-row">
    <span class="clock-digits" id="el-h">00</span>
    <span class="clock-sep">:</span>
    <span class="clock-digits" id="el-m">00</span>
  </div>

  <div id="el-date">Monday · January 1 · 2026</div>

  <div class="divider"></div>

  <div id="quote-wrap">
    <div id="el-quote"></div>
    <div id="el-author"></div>
  </div>
</div>

<script>
// ┌──────────────────────────────────────────────────────┐
// │  config.js — timing and display settings             │
// └──────────────────────────────────────────────────────┘
const config = {
  quoteIntervalMs:      180_000,  // rotate quote every 3 min
  backgroundIntervalMs: 600_000,  // rotate background every 10 min
  transitionMs:         1_200,    // crossfade duration in ms
  overlayOpacity:       0.25,     // 0 = no overlay, 1 = black screen
  hour24:               true,     // false = 12h clock

  // Google Drive — folder must be shared "Anyone with link can view"
  driveFolder: '1qGIlmBJVUC3l3X4LeiL_0294giH3cq0M',
  driveApiKey:  'AIzaSyBwV_t9bdHuVM_plx_1fWmqagf8IMi9h2A',
};

// ── Bootstrap ──────────────────────────────────────────
(async function init() {
  applyOverlay();

  const [backgrounds, quotes] = await Promise.all([
    fetchDriveImages(config.driveFolder, config.driveApiKey).catch(() => []),
    fetchJSON('/data/quotes.json').catch(() => []),
  ]);

  const enabledQuotes = quotes.filter(q => q.enabled !== false);

  startClock();
  startBackgrounds(backgrounds);
  startQuotes(enabledQuotes);
})();

// ── Overlay ─────────────────────────────────────────────
function applyOverlay() {
  document.getElementById('overlay').style.background =
    `rgba(0,0,0,${config.overlayOpacity})`;
}

// ── Clock ────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

function startClock() {
  function tick() {
    const now = new Date();
    let h = now.getHours();
    if (!config.hour24) h = h % 12 || 12;

    document.getElementById('el-h').textContent = String(h).padStart(2, '0');
    document.getElementById('el-m').textContent = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('el-date').textContent =
      `${DAYS[now.getDay()]}  ·  ${MONTHS[now.getMonth()]} ${now.getDate()}  ·  ${now.getFullYear()}`;
  }
  tick();
  setInterval(tick, 1000);
}

// ── Backgrounds ──────────────────────────────────────────
function startBackgrounds(list) {
  const layers = [document.getElementById('bg-0'), document.getElementById('bg-1')];
  const duration = `${config.transitionMs}ms`;
  layers.forEach(l => l.style.transition = `opacity ${duration} ease`);

  let active = 0;
  let index  = 0;

  function advance() {
    if (list.length < 2) return;
    index = (index + 1) % list.length;
    const next = 1 - active;
    preload(list[index], () => {
      layers[next].style.backgroundImage = `url('${list[index]}')`;
      layers[active].style.opacity = '0';
      layers[next].style.opacity   = '1';
      active = next;
      preload(list[(index + 1) % list.length]);
    });
  }

  // Always attach — even if images haven't loaded yet
  document.getElementById('skip-bg').addEventListener('click', advance);

  if (!list.length) return;

  // Show first image
  preload(list[0], () => {
    layers[0].style.backgroundImage = `url('${list[0]}')`;
    layers[0].style.opacity = '1';
    if (list.length > 1) preload(list[1]);
  });

  if (list.length > 1) {
    setInterval(advance, config.backgroundIntervalMs);
  }
}

// ── Quotes ───────────────────────────────────────────────
function startQuotes(list) {
  if (!list.length) return;

  const wrap   = document.getElementById('quote-wrap');
  const elText = document.getElementById('el-quote');
  const elAuth = document.getElementById('el-author');
  let index    = 0;

  function show(q) {
    elText.textContent = `\u201C${q.text}\u201D`;
    elAuth.textContent = q.author ? `\u2014\u2002${q.author}` : '';
  }

  show(list[0]);

  if (list.length < 2) return;

  setInterval(() => {
    wrap.style.opacity = '0';
    setTimeout(() => {
      index = (index + 1) % list.length;
      show(list[index]);
      wrap.style.opacity = '1';
    }, 700);
  }, config.quoteIntervalMs);
}

// ── Google Drive ─────────────────────────────────────────
async function fetchDriveImages(folderId, apiKey) {
  const q      = encodeURIComponent(`'${folderId}' in parents and mimeType contains 'image/' and trashed = false`);
  const fields = encodeURIComponent('files(id,name)');
  const url    = `https://www.googleapis.com/drive/v3/files?q=${q}&key=${apiKey}&fields=${fields}&orderBy=name&pageSize=100`;

  const res  = await fetch(url);
  if (!res.ok) throw new Error(`Drive API ${res.status}`);
  const data = await res.json();

  return (data.files || []).map(f =>
    `https://drive.google.com/thumbnail?id=${f.id}&sz=w3840`
  );
}

// ── Helpers ──────────────────────────────────────────────
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`${res.status} ${url}`);
  return res.json();
}

function preload(src, cb) {
  const img = new Image();
  if (cb) img.onload = cb;
  img.src = src;
}
</script>

</body>
</html>
