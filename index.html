<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frame Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    /* ── Background ──────────────────────────────────
       To use a custom image, set BACKGROUND in CONFIG.
       Default: deep atmospheric gradient.              */
    #bg {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 70% 20%, rgba(14, 18, 30, 0.7) 0%, transparent 60%),
        radial-gradient(ellipse 80% 100% at 20% 90%, rgba(10, 12, 20, 0.8) 0%, transparent 55%),
        linear-gradient(160deg, #0b0d14 0%, #0d0d0f 45%, #090909 100%);
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* Soft vignette */
    #bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 100% 100% at 50% 50%,
        transparent 30%,
        rgba(0, 0, 0, 0.55) 100%
      );
    }

    /* ── Content ─────────────────────────────────── */
    #app {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 9vw;
      z-index: 1;
      animation: appear 2s ease both;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(1vw); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Clock ───────────────────────────────────── */
    .clock-row {
      display: flex;
      align-items: baseline;
      user-select: none;
    }

    .clock-digits {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 18vw;
      color: rgba(220, 212, 200, 0.92);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .clock-sep {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-weight: 300;
      font-size: 18vw;
      color: rgba(220, 212, 200, 0.92);
      letter-spacing: -0.02em;
      line-height: 1;
      margin: 0 0.25vw;
      animation: blink 2s step-end infinite;
    }

    @keyframes blink {
      0%, 49% { opacity: 0.92; }
      50%, 100% { opacity: 0.08; }
    }

    /* ── Date ────────────────────────────────────── */
    .date-row {
      margin-top: 1.2vw;
      font-family: 'Raleway', sans-serif;
      font-weight: 200;
      font-size: 0.95vw;
      letter-spacing: 0.55em;
      text-transform: uppercase;
      color: rgba(160, 150, 136, 0.7);
      user-select: none;
    }

    /* ── Divider ─────────────────────────────────── */
    .divider {
      width: 6vw;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(120, 110, 95, 0.35), transparent);
      margin: 3vw 0;
    }

    /* ── Quote ───────────────────────────────────── */
    .quote-wrap {
      text-align: center;
      max-width: 42vw;
    }

    #el-quote {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-style: italic;
      font-weight: 300;
      font-size: 2vw;
      line-height: 1.55;
      color: rgba(180, 170, 156, 0.65);
      letter-spacing: 0.01em;
    }

    #el-author {
      margin-top: 1.1vw;
      font-family: 'Raleway', sans-serif;
      font-weight: 200;
      font-size: 0.72vw;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: rgba(100, 93, 82, 0.6);
    }
  </style>
</head>
<body>

<div id="bg"></div>

<div id="app">

  <!-- Clock -->
  <div class="clock-row">
    <span class="clock-digits" id="el-h">00</span>
    <span class="clock-sep">:</span>
    <span class="clock-digits" id="el-m">00</span>
  </div>

  <!-- Date -->
  <div class="date-row" id="el-date">Monday · January 1 · 2026</div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Quote -->
  <div class="quote-wrap">
    <div id="el-quote"></div>
    <div id="el-author"></div>
  </div>

</div>

<script>
// ┌──────────────────────────────────────────────────────────┐
// │  CONFIG                                                  │
// └──────────────────────────────────────────────────────────┘
const CONFIG = {

  // Background image URL — paste any direct image link here.
  // Leave empty ('') to use the default dark gradient.
  // Example: 'https://images.unsplash.com/photo-abc?w=1920'
  BACKGROUND: '',

  // Your quote
  QUOTE: 'The secret of getting ahead is getting started.',

  // Attribution — leave empty to hide
  AUTHOR: 'Mark Twain',

  // Clock format: true = 24h, false = 12h
  HOUR_24: true,

};
// ──────────────────────────────────────────────────────────

// Apply background image if set
if (CONFIG.BACKGROUND) {
  document.getElementById('bg').style.background =
    `url('${CONFIG.BACKGROUND}') center/cover no-repeat`;
}

// Inject quote
document.getElementById('el-quote').textContent = `\u201C${CONFIG.QUOTE}\u201D`;
if (CONFIG.AUTHOR) {
  document.getElementById('el-author').textContent = `\u2014\u2002${CONFIG.AUTHOR}`;
}

// ── Clock ──────────────────────────────────────────────────
const elH    = document.getElementById('el-h');
const elM    = document.getElementById('el-m');
const elDate = document.getElementById('el-date');

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['January','February','March','April','May','June',
                'July','August','September','October','November','December'];

function tick() {
  const now = new Date();
  let h = now.getHours();
  if (!CONFIG.HOUR_24) h = h % 12 || 12;

  elH.textContent = String(h).padStart(2, '0');
  elM.textContent = String(now.getMinutes()).padStart(2, '0');
  elDate.textContent =
    `${DAYS[now.getDay()]}  ·  ${MONTHS[now.getMonth()]} ${now.getDate()}  ·  ${now.getFullYear()}`;
}

tick();
setInterval(tick, 1000);
</script>

</body>
</html>
